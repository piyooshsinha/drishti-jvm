name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release -p drishti-tui --target ${{ matrix.target }} --locked
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf drishti-jvm-${{ github.ref_name }}-${{ matrix.target }}.tar.gz drishti-jvm
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/drishti-jvm-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          generate_release_notes: true
